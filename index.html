<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Shuffle Storm Set C – Premium Pink Review</title>
  <style>
    :root{
      --bg0:#24061f;
      --bg1:#4a1240;
      --bg2:#6f1d63;
      --blue:#ff9adf;
      --blue2:#ff72ca;
      --yellow:#ffd0ef;
      --yellow2:#ffe8f8;
      --white:#fff9fd;
      --red:#ff5fa9;
      --green:#8ff7d5;
      --line:rgba(255,255,255,.16);
      --shadow:0 24px 60px rgba(33,0,27,.42);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Arial,Helvetica,sans-serif;background:#2a0824;color:var(--white);overflow-x:hidden}
    body{
      background:
        radial-gradient(circle at 12% 10%, rgba(255,154,223,.22), transparent 20%),
        radial-gradient(circle at 88% 12%, rgba(255,208,239,.18), transparent 22%),
        radial-gradient(circle at 50% 0%, rgba(255,114,202,.16), transparent 26%),
        linear-gradient(180deg,var(--bg2),var(--bg1) 40%,var(--bg0));
    }

    .layer,.layer2,.layer3,.glowfield{position:fixed;inset:0;pointer-events:none}
    .layer{
      background-image:
        radial-gradient(circle, rgba(255,255,255,.9) 1px, transparent 1.7px),
        radial-gradient(circle, rgba(76,201,255,.85) 1px, transparent 1.8px),
        radial-gradient(circle, rgba(255,216,77,.75) 1px, transparent 1.8px);
      background-size:140px 140px, 220px 220px, 180px 180px;
      animation:drift 100s linear infinite; opacity:.5;
    }
    .layer2{
      background:
        radial-gradient(circle at 20% 25%, rgba(76,201,255,.08), transparent 18%),
        radial-gradient(circle at 75% 60%, rgba(255,216,77,.08), transparent 18%),
        radial-gradient(circle at 55% 18%, rgba(76,201,255,.06), transparent 14%);
      filter:blur(34px); animation:drift2 36s linear infinite; opacity:.9;
    }
    .layer3{
      background:
        repeating-linear-gradient(90deg, transparent 0 95px, rgba(255,255,255,.03) 95px 96px),
        repeating-linear-gradient(0deg, transparent 0 95px, rgba(255,255,255,.025) 95px 96px);
      mask-image:linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.65));
      opacity:.22;
    }
    .glowfield::before,.glowfield::after{
      content:""; position:absolute; width:42vw; height:42vw; border-radius:50%;
      filter:blur(80px); opacity:.16;
    }
    .glowfield::before{left:-10vw; top:10vh; background:#28c7ff;}
    .glowfield::after{right:-12vw; top:18vh; background:#ffd84d;}
    @keyframes drift{from{transform:translateY(0)}to{transform:translateY(220px)}}
    @keyframes drift2{from{transform:translateX(-30px)}to{transform:translateX(30px)}}

    .app{position:relative;z-index:2;min-height:100vh}
    .wrap{max-width:1280px;margin:0 auto;padding:22px}
    .glass{
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.045));
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.08);
      backdrop-filter:blur(14px);
    }
    .neon{position:relative;overflow:hidden}
    .neon::before{
      content:""; position:absolute; inset:-1px; border-radius:inherit; padding:1px;
      background:linear-gradient(120deg, rgba(76,201,255,.96), rgba(255,216,77,.74), rgba(76,201,255,.96));
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      -webkit-mask-composite:xor; mask-composite:exclude;
      opacity:.92; pointer-events:none;
    }

    .start-screen,.summary-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
    .hero{display:grid;grid-template-columns:1.15fr .85fr;gap:26px;padding:30px}
    .badge{
      display:inline-flex;align-items:center;gap:10px;
      padding:10px 16px;border-radius:999px;
      background:rgba(76,201,255,.16);border:1px solid rgba(76,201,255,.28);
      color:#d8f6ff;font-weight:900;letter-spacing:.5px
    }
    .title{
      font-size:clamp(2.5rem,6vw,5.8rem);
      line-height:.9;margin:16px 0 10px;font-weight:900;
      text-shadow:0 0 18px rgba(76,201,255,.34),0 0 28px rgba(255,216,77,.14);
    }
    .subtitle{font-size:1.14rem;line-height:1.85;color:rgba(255,255,255,.84)}
    .features{display:grid;gap:12px;margin-top:18px}
    .features div{
      padding:13px 15px;border-radius:18px;background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);font-weight:700;color:rgba(255,255,255,.86)
    }
    .panel{padding:26px}
    .input{
      width:100%;border:none;outline:none;border-radius:20px;padding:18px 20px;
      background:#fff;color:#141414;font-size:1.12rem;font-weight:900
    }
    .label{font-size:.92rem;color:rgba(255,255,255,.66);margin-bottom:8px}
    .btnrow{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
    .btn{
      border:none;cursor:pointer;border-radius:20px;padding:15px 22px;
      font-size:1rem;font-weight:900;transition:.18s ease;position:relative;overflow:hidden
    }
    .btn:hover{transform:translateY(-2px) scale(1.01)}
    .btn:active{transform:translateY(0) scale(.99)}
    .btn-primary{
      background:linear-gradient(180deg,#78dcff,#1b9cff);
      color:#041523; box-shadow:0 18px 35px rgba(27,156,255,.34)
    }
    .btn-secondary{
      background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.12)
    }
    .btn-gold{
      background:linear-gradient(180deg,#fff29a,#ffd942);
      color:#2a2200; box-shadow:0 14px 30px rgba(255,217,66,.28)
    }
    .btn-help{
      background:linear-gradient(180deg,#8ee7ff,#4bc9ff);
      color:#052130; box-shadow:0 14px 28px rgba(75,201,255,.22)
    }
    .btn-danger{
      background:linear-gradient(180deg,#ff8e54,#ff6b2d);
      color:white; box-shadow:0 14px 28px rgba(255,107,45,.24)
    }
    .btn[disabled], .used{
      opacity:.48;filter:saturate(.45);cursor:not-allowed;transform:none!important
    }

    .promo{
      margin-top:16px;padding:18px;border-radius:22px;
      background:linear-gradient(180deg, rgba(76,201,255,.12), rgba(76,201,255,.05));
      border:1px solid rgba(76,201,255,.16);
      font-weight:700; color:rgba(255,255,255,.84); line-height:1.78;
    }
    .ring{
      margin-top:18px;height:180px;position:relative;
      display:flex;align-items:center;justify-content:center;
    }
    .ring::before,.ring::after{
      content:"";position:absolute;border-radius:50%;border:2px solid rgba(255,255,255,.12)
    }
    .ring::before{
      width:180px;height:180px;
      box-shadow:0 0 40px rgba(76,201,255,.16) inset, 0 0 32px rgba(76,201,255,.18)
    }
    .ring::after{
      width:120px;height:120px;border-color:rgba(255,216,77,.24);
      box-shadow:0 0 26px rgba(255,216,77,.22)
    }
    .core{
      width:86px;height:86px;border-radius:50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.42), transparent 18%),
        linear-gradient(180deg,#9ae8ff,#1aa6ff);
      border:4px solid rgba(255,255,255,.7);
      display:flex; align-items:center; justify-content:center;
      font-size:2rem; font-weight:900; color:#062133;
      box-shadow:0 0 28px rgba(76,201,255,.28);
      animation:pulsecore 2.4s ease-in-out infinite;
    }
    @keyframes pulsecore{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

    .game{min-height:100vh;padding:14px}
    .hud{display:grid;grid-template-columns:1.35fr .85fr;gap:14px;margin-bottom:14px}
    .hud-card{padding:18px 20px}
    .stats{display:flex;flex-wrap:wrap;gap:16px;justify-content:space-between;align-items:center}
    .stat .k{font-size:.82rem;color:rgba(255,255,255,.62)}
    .stat .v{font-size:2rem;font-weight:900}
    .v-blue{color:#b6f0ff}.v-yellow{color:var(--yellow)}.v-cyan{color:#aef6ff}.v-red{color:#ffbd9b}
    .mission{text-align:center}
    .mission h3{margin:0;font-size:.92rem;color:rgba(255,255,255,.66)}
    .mission .big{font-size:1.54rem;font-weight:900;margin-top:8px}
    .mission .point{margin-top:8px;color:#ffeaaa;font-weight:900}

    .arena{padding:22px;position:relative;overflow:hidden}
    .arena::before{
      content:""; position:absolute; inset:-30% auto auto -10%; width:40%; height:80%;
      background:linear-gradient(90deg, rgba(255,255,255,.07), transparent); transform:rotate(18deg);
      pointer-events:none;
    }
    .arena::after{
      content:""; position:absolute; inset:auto 6% 0 6%; height:120px;
      background:radial-gradient(circle at 50% 20%, rgba(76,201,255,.16), transparent 58%);
      filter:blur(18px); pointer-events:none;
    }
    .step-banner{text-align:center;margin-bottom:12px;font-size:1rem;font-weight:900;letter-spacing:.7px;color:#eaf9ff;text-transform:uppercase}
    .hint-status{text-align:center;margin:4px 0 16px;color:rgba(255,255,255,.8);font-weight:800;font-size:.98rem}
    .help-row,.controls{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
    .help-row{margin-bottom:14px}
    .slots{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;min-height:96px;margin:8px 0 30px}
    .slot{
      width:66px;height:66px;border-radius:18px;border:2px dashed rgba(255,255,255,.28);
      display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07);color:rgba(255,255,255,.18);
      font-size:2rem;font-weight:900;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.03), 0 12px 20px rgba(0,0,0,.16);
      transition:.18s ease;
    }
    .slot.filled{
      background:linear-gradient(180deg,#fff0a3,#ffd93d);
      color:#231d09;border-style:solid;border-color:#fff6c8
    }
    .slot.fixed{
      background:linear-gradient(180deg,#a8f7ff,#58ddff);
      color:#062530;border-style:solid;border-color:#d4fbff;
      box-shadow:0 0 18px rgba(76,201,255,.26)
    }

    .letters{
      display:flex;justify-content:center;flex-wrap:wrap;gap:18px;min-height:210px;align-items:center;padding:6px 10px 20px
    }
    .letter{
      width:84px;height:84px;border-radius:50%;
      border:4px solid rgba(255,255,255,.72);
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,.42), transparent 18%),
        linear-gradient(180deg,#86e5ff,#23b1ff 56%,#0c5ecf);
      color:#ffffff;font-size:2.25rem;font-weight:900;display:flex;align-items:center;justify-content:center;
      cursor:pointer;user-select:none;position:relative;
      box-shadow:0 18px 32px rgba(35,177,255,.28), 0 0 0 3px rgba(255,255,255,.04) inset;
      animation:floatSoft 4.8s ease-in-out infinite;
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .letter::after{
      content:"";position:absolute;left:18%;right:18%;bottom:9%;height:10px;border-radius:999px;
      background:rgba(255,255,255,.16);filter:blur(8px)
    }
    .letter:nth-child(2n){animation-duration:5.4s}
    .letter:nth-child(3n){animation-duration:4.3s}
    .letter:hover{
      transform:scale(1.06);
      box-shadow:0 24px 40px rgba(35,177,255,.34), 0 0 0 3px rgba(255,255,255,.04) inset
    }
    @keyframes floatSoft{
      0%,100%{transform:translateY(0) rotate(-2deg)}
      50%{transform:translateY(-5px) rotate(2deg)}
    }

    .bottom-note{text-align:center;margin-top:12px;color:rgba(255,255,255,.68);font-weight:700}

    .popup,.countdown,.result-overlay{
      position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:120;
      background:rgba(0,0,0,.48);backdrop-filter:blur(6px)
    }
    .popup.show,.countdown.show,.result-overlay.show{display:flex}
    .popup-box,.result-box{
      min-width:min(88vw,560px);max-width:560px;border-radius:32px;padding:34px 30px;text-align:center;
      border:1px solid rgba(255,255,255,.18);box-shadow:0 28px 60px rgba(0,0,0,.46);animation:pop .18s ease
    }
    .popup-box{
      background:linear-gradient(180deg,#ff7e54,#ff5f6b)
    }
    .popup-box h2{margin:6px 0 0;font-size:3.2rem}
    .popup-box p{margin:8px 0 0;font-size:1.15rem}
    .result-box.correct{
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,248,214,.96));
      color:#16324a;
      box-shadow:0 28px 60px rgba(0,0,0,.46), 0 0 0 3px rgba(255,216,77,.28) inset, 0 0 28px rgba(76,201,255,.22);
    }
    .result-box.failmission{
      background:linear-gradient(180deg, rgba(255,130,91,.96), rgba(210,72,47,.94)); color:#fff4ef
    }
    .result-emoji{font-size:4.2rem;line-height:1;animation:bobble .9s ease-in-out infinite}
    .result-title{font-size:2.5rem;font-weight:900;margin-top:8px}
    .result-sub{margin-top:10px;font-size:1.16rem;font-weight:800}
    .confetti{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:12px;font-size:2rem}
    .mini-confetti{display:inline-block;animation:confettiPop 1s ease-in-out infinite alternate}
    .mini-confetti:nth-child(2n){animation-delay:.15s}
    .mini-confetti:nth-child(3n){animation-delay:.3s}
    @keyframes pop{from{transform:scale(.76);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes bobble{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-6px) rotate(4deg)}}
@keyframes confettiPop{0%{transform:translateY(0) scale(.9) rotate(-10deg)}100%{transform:translateY(-8px) scale(1.08) rotate(10deg)}}
    .count-circle{
      width:min(40vw,240px);height:min(40vw,240px);border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:min(16vw,7rem);font-weight:900;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.40), transparent 14%),
        linear-gradient(180deg,#9ae8ff,#1aa6ff);
      border:6px solid rgba(255,255,255,.74);
      color:#062133;
      box-shadow:0 0 45px rgba(76,201,255,.36), 0 25px 60px rgba(0,0,0,.45);
      animation:pulse .6s ease;
    }
    @keyframes pulse{from{transform:scale(.78);opacity:0}to{transform:scale(1);opacity:1}}

    .summary-box{width:min(1220px,96vw);padding:30px}
    .summary-head{text-align:center;margin-bottom:24px}
    .summary-head h1{font-size:clamp(2.3rem,5vw,4.8rem);margin:.2em 0 .08em}
    .score-line{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;color:var(--yellow)}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:14px;max-height:56vh;overflow:auto;padding-right:4px}
    .mini{padding:16px;border-radius:20px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.10)}
    .mini .top{display:flex;justify-content:space-between;gap:10px;align-items:center}
    .mini .word{font-size:1.3rem;font-weight:900}
    .tag{display:inline-block;padding:6px 10px;border-radius:999px;font-size:.8rem;font-weight:900}
    .ok{background:rgba(84,244,160,.18);color:#c6ffdf}
    .bad{background:rgba(255,98,123,.18);color:#ffd3dc}
    .timeout{background:rgba(255,216,77,.17);color:#fff2b8}
    .muted{color:rgba(255,255,255,.74)}

    .flash-correct{
      box-shadow:0 0 0 2px rgba(84,244,160,.76), 0 0 28px rgba(84,244,160,.28), inset 0 0 34px rgba(84,244,160,.08)!important
    }
    .flash-wrong{
      box-shadow:0 0 0 2px rgba(255,98,123,.86), 0 0 30px rgba(255,98,123,.26), inset 0 0 34px rgba(255,98,123,.08)!important
    }

    
    .review-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
    .review-shell{padding:28px}
    .review-head{text-align:center;margin-bottom:20px}
    .review-head h1{font-size:clamp(2.2rem,5vw,4.2rem);margin:.15em 0 .08em;text-shadow:0 0 18px rgba(255,154,223,.24)}
    .review-sub{color:rgba(255,255,255,.84);font-size:1.05rem;line-height:1.8}
    .review-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:18px;max-height:58vh;overflow:auto;padding-right:4px}
    .review-card{
      padding:16px;border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.07));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 14px 30px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.08);
      text-align:center;
    }
    .review-word{font-size:1.55rem;font-weight:900;color:#fff}
    .review-hint{margin-top:6px;font-size:1.02rem;font-weight:900;color:#ffd6ee}
    .review-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:26px}
    .speak-btn{
      margin-top:10px;border:none;cursor:pointer;border-radius:16px;padding:10px 14px;
      font-size:.98rem;font-weight:900;color:#4c0937;
      background:linear-gradient(180deg,#ffe8f8,#ffc3e8);
      box-shadow:0 10px 20px rgba(255,153,214,.22)
    }
    .speak-btn:hover{transform:translateY(-1px)}

    @media (max-width:920px){
      .hero,.hud{grid-template-columns:1fr}
      .title{font-size:clamp(2rem,12vw,4.2rem)}
      .panel,.hud-card,.arena,.summary-box{padding:20px}
      .slot{width:58px;height:58px;font-size:1.85rem}
      .letter{width:74px;height:74px;font-size:2rem}
    }
  </style>
</head>
<body>
  <div class="layer"></div><div class="layer2"></div><div class="layer3"></div><div class="glowfield"></div>
  <div id="app" class="app"></div>

  <div id="failPopup" class="popup">
    <div class="popup-box">
      <div style="font-size:3rem">💥</div>
      <h2>FAIL</h2>
      <p>Try again!!</p>
    </div>
  </div>

  <div id="countdown" class="countdown">
    <div class="count-circle" id="countNum">3</div>
  </div>

  <div id="resultOverlay" class="result-overlay">
    <div id="resultBox" class="result-box">
      <div id="resultEmoji" class="result-emoji"></div>
      <div id="resultTitle" class="result-title"></div>
      <div id="resultSub" class="result-sub"></div>
      <div id="resultExtra" class="confetti"></div>
    </div>
  </div>

  <script>
    const WORDS = [
      { word: "banana", hint: "กล้วย" },
      { word: "orange", hint: "ส้ม" },
      { word: "school", hint: "โรงเรียน" },
      { word: "doctor", hint: "หมอ" },
      { word: "market", hint: "ตลาด" },
      { word: "flower", hint: "ดอกไม้" },
      { word: "mother", hint: "แม่" },
      { word: "window", hint: "หน้าต่าง" },
      { word: "rabbit", hint: "กระต่าย" },
      { word: "planet", hint: "ดาวเคราะห์" },
      { word: "friend", hint: "เพื่อน" },
      { word: "jungle", hint: "ป่า" },
      { word: "silver", hint: "เงิน" },
      { word: "castle", hint: "ปราสาท" },
      { word: "rocket", hint: "จรวด" },
      { word: "pencil", hint: "ดินสอ" },
      { word: "guitar", hint: "กีตาร์" },
      { word: "butter", hint: "เนย" },
      { word: "dragon", hint: "มังกร" },
      { word: "winter", hint: "ฤดูหนาว" }
    ];

    const state = {
      screen:"start", playerName:"", sfxOn:true, wordIndex:0, round:null, slots:[], pool:[],
      score:0, history:[], timeLeft:30, timer:null, flash:"",
      attempts:1, usedMeaning:false, usedReveal:false
    };

    function shuffle(arr){
      const a=[...arr];
      for(let i=a.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    }
    function uniqueIndices(len,count){
      return shuffle([...Array(len).keys()]).slice(0,count).sort((a,b)=>a-b);
    }
    function buildRound(item){
      const letters=item.word.split("");
      return {
        answer:letters,
        hint:item.hint,
        pool:shuffle(letters.map((ch,i)=>({id:`${item.word}-${i}-${Math.random()}`, ch, originalIndex:i})))
      };
    }

    let audioCtx=null;
    function getCtx(){
      const AC=window.AudioContext||window.webkitAudioContext;
      if(!AC) return null;
      if(!audioCtx) audioCtx=new AC();
      return audioCtx;
    }
    function beep(type="click"){
      if(!state.sfxOn) return;
      const ctx=getCtx();
      if(!ctx) return;
      const o1=ctx.createOscillator(), g1=ctx.createGain(), o2=ctx.createOscillator(), g2=ctx.createGain();
      o1.connect(g1); g1.connect(ctx.destination);
      o2.connect(g2); g2.connect(ctx.destination);

      if(type==="correct"){
        o1.type="triangle"; o1.frequency.value=780;
        o2.type="sine"; o2.frequency.value=1000;
        g1.gain.setValueAtTime(.001,ctx.currentTime);
        g1.gain.exponentialRampToValueAtTime(.08,ctx.currentTime+.01);
        g1.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.20);
        g2.gain.setValueAtTime(.001,ctx.currentTime+.03);
        g2.gain.exponentialRampToValueAtTime(.05,ctx.currentTime+.05);
        g2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.18);
      } else if(type==="wrong"){
        o1.type="sawtooth"; o1.frequency.value=180;
        o2.type="square"; o2.frequency.value=130;
        g1.gain.setValueAtTime(.001,ctx.currentTime);
        g1.gain.exponentialRampToValueAtTime(.08,ctx.currentTime+.01);
        g1.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.24);
        g2.gain.setValueAtTime(.001,ctx.currentTime);
        g2.gain.exponentialRampToValueAtTime(.05,ctx.currentTime+.02);
        g2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.22);
      } else {
        o1.type="triangle"; o1.frequency.value=430;
        g1.gain.setValueAtTime(.001,ctx.currentTime);
        g1.gain.exponentialRampToValueAtTime(.04,ctx.currentTime+.01);
        g1.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.09);
      }
      o1.start(); o1.stop(ctx.currentTime+.28);
      o2.start(); o2.stop(ctx.currentTime+.28);
    }


    function speakWord(word){
      if(!('speechSynthesis' in window)) return;
      const msg = new SpeechSynthesisUtterance(word);
      msg.lang = "en-US";
      msg.rate = 0.82;
      msg.pitch = 1.03;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(msg);
    }

    function startCountdownThenPlay(){
      const wrap=document.getElementById("countdown");
      const num=document.getElementById("countNum");
      let c=3;
      num.textContent=c;
      wrap.classList.add("show");
      beep("click");
      const it=setInterval(()=>{
        c--;
        if(c>0){
          num.textContent=c;
          num.style.animation="none";
          void num.offsetWidth;
          num.style.animation="pulse .6s ease";
          beep("click");
        } else {
          clearInterval(it);
          wrap.classList.remove("show");
          state.wordIndex=0;
          state.score=0;
          state.history=[];
          state.screen="game";
          setupWord(0);
          render();
        }
      },650);
    }

    function setupWord(i){
      state.round=buildRound(WORDS[i]);
      state.slots=state.round.answer.map(()=>null);
      state.pool=state.round.pool;
      state.timeLeft=null;
      state.flash="";
      state.attempts=1;
      state.usedMeaning=false;
      state.usedReveal=false;
      // No timer mode: children can take their time.
    }

    function startTimer(){
      // Timer disabled in this no-time-limit version.
      clearInterval(state.timer);
    }

    function placeLetter(id){
      const item=state.pool.find(p=>p.id===id);
      if(!item) return;
      const idx=state.slots.findIndex(s=>s===null);
      if(idx===-1) return;
      beep("click");
      state.slots[idx]=item;
      state.pool=state.pool.filter(p=>p.id!==id);
      render();
    }

    function removeLetter(idx){
      const item=state.slots[idx];
      if(!item || item.fixed) return;
      beep("click");
      state.slots[idx]=null;
      state.pool=shuffle([...state.pool,item]);
      render();
    }

    function clearSlots(){
      const back=[];
      state.slots.forEach((item,idx)=>{
        if(item && !item.fixed){
          back.push(item);
          state.slots[idx]=null;
        }
      });
      state.pool=shuffle([...state.pool,...back]);
      beep("click");
      render();
    }

    function useMeaningHint(){
      if(state.usedMeaning) return;
      state.usedMeaning=true;
      beep("click");
      render();
    }

    function useRevealHint(){
      if(state.usedReveal) return;
      state.usedReveal=true;
      const indices=uniqueIndices(state.round.answer.length, Math.min(2,state.round.answer.length));
      const back=[];
      state.slots.forEach((item,idx)=>{
        if(item && !item.fixed){
          back.push(item);
          state.slots[idx]=null;
        }
      });
      state.pool=[...state.pool,...back];
      indices.forEach(idx=>{
        state.slots[idx]={fixed:true, ch:state.round.answer[idx], id:`fixed-${state.wordIndex}-${idx}`};
      });
      state.pool=shuffle(state.pool.filter(p=>!indices.includes(p.originalIndex)));
      beep("click");
      render();
    }

    function calcScore(){
      if(state.attempts>=2) return 1;
      if(!state.usedMeaning && !state.usedReveal) return 3;
      if(state.usedMeaning && state.usedReveal) return 1;
      return 2;
    }

    function showFail(){
      const pop=document.getElementById("failPopup");
      pop.classList.add("show");
      setTimeout(()=>pop.classList.remove("show"),900);
    }

    function showResult(type,title,sub,extraHtml,duration=1200){
      const overlay=document.getElementById("resultOverlay");
      const box=document.getElementById("resultBox");
      document.getElementById("resultEmoji").textContent = type==="correct" ? "😊" : "⚠️";
      document.getElementById("resultTitle").textContent=title;
      document.getElementById("resultSub").textContent=sub;
      document.getElementById("resultExtra").innerHTML=extraHtml||"";
      box.className="result-box "+(type==="correct" ? "correct" : "failmission");
      overlay.classList.add("show");
      setTimeout(()=>overlay.classList.remove("show"),duration);
    }

    function checkAnswer(){
      if(state.slots.some(s=>!s)) return;
      const attempt=state.slots.map(s=>s.ch).join("");
      const correct=state.round.answer.join("");
      if(attempt===correct){
        beep("correct");
        state.flash="correct";
        const gained=calcScore();
        state.score+=gained;
        state.history.push({
          word:WORDS[state.wordIndex].word,
          hint:WORDS[state.wordIndex].hint,
          result:"correct",
          gained,
          answer:correct,
          attempt,
          usedMeaning:state.usedMeaning,
          usedReveal:state.usedReveal,
          attempts:state.attempts
        });
        render();
        showResult("correct","CORRECT",`ได้ ${gained} คะแนน`,`<span class="mini-confetti">🎉</span><span class="mini-confetti">✨</span><span class="mini-confetti">🎊</span><span class="mini-confetti">🩵</span><span class="mini-confetti">💛</span>`);
        setTimeout(nextWord,1200);
      } else {
        beep("wrong");
        state.flash="wrong";
        state.history.push({
          word:WORDS[state.wordIndex].word,
          hint:WORDS[state.wordIndex].hint,
          result:"wrong",
          gained:0,
          answer:correct,
          attempt,
          usedMeaning:state.usedMeaning,
          usedReveal:state.usedReveal,
          attempts:state.attempts
        });
        state.attempts += 1;
        showFail();
        setTimeout(()=>{state.flash=""; render();},900);
      }
    }

    function handleTimeUp(){
      beep("wrong");
      const correct=state.round.answer.join("");
      state.history.push({
        word:WORDS[state.wordIndex].word,
        hint:WORDS[state.wordIndex].hint,
        result:"timeout",
        gained:0,
        answer:correct,
        usedMeaning:state.usedMeaning,
        usedReveal:state.usedReveal,
        attempts:state.attempts
      });
      showResult("missionfail","ภารกิจไม่สำเร็จ",`คำตอบคือ ${correct}`,"");
      setTimeout(nextWord,1300);
    }

    function nextWord(){
      const next=state.wordIndex+1;
      if(next>=WORDS.length){
        clearInterval(state.timer);
        state.screen="summary";
        render();
        return;
      }
      state.wordIndex=next;
      setupWord(next);
      render();
    }

    function showReview(){
      clearInterval(state.timer);
      state.screen="review";
      render();
    }

    function goHome(){
      clearInterval(state.timer);
      state.screen="start";
      render();
    }

    function currentScoreGuide(){
      if(state.attempts>=2) return "รอบนี้ถ้าถูก จะได้ 1 คะแนน";
      if(!state.usedMeaning && !state.usedReveal) return "ไม่ใช้ตัวช่วยและตอบถูก = 3 คะแนน";
      if(state.usedMeaning && state.usedReveal) return "ใช้ตัวช่วย 2 อย่างแล้ว ถ้าถูก = 1 คะแนน";
      return "ใช้ตัวช่วย 1 อย่าง ถ้าถูก = 2 คะแนน";
    }

    function renderStart(){
      return `
        <div class="start-screen">
          <div class="wrap">
            <div class="glass neon hero">
              <div class="panel">
                <div class="badge">🎀 WORD SHUFFLE STORM • SET 2</div>
                <div class="title">Premium Pink<br>Word Storm ✨</div>
                <div class="subtitle">
                  เวอร์ชันไม่จับเวลา + มีหน้าทบทวนก่อนลงสนามแล้วจ้า 💖
                  ให้เด็ก ๆ ผ่านตาคำศัพท์ก่อน แล้วค่อยเข้าเกมจริง ค่อย ๆ คิดได้แบบไม่กดดัน
                </div>
                <div class="features">
                  <div>📘 มีหน้า <b>Review</b> ทบทวนคำศัพท์ครบทุกคำก่อนเล่น</div>
                  <div>🔊 กดฟังเสียงอ่านคำศัพท์ได้ทีละคำ</div>
                  <div>🌟 ตอบถูกครั้งแรกแบบไม่ใช้ตัวช่วย = <b>3 คะแนน</b></div>
                  <div>🌸 ไม่จับเวลา เด็กค่อย ๆ คิดและเรียงคำได้จนเสร็จ</div>
                </div>
              </div>

              <div class="panel glass" style="background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05))">
                <div class="label">ชื่อผู้เล่น</div>
                <input id="playerName" class="input" placeholder="พิมพ์ชื่อก่อนเริ่ม" value="${state.playerName}">
                <div class="btnrow">
                  <button id="toggleSfx" class="btn btn-secondary">${state.sfxOn ? "🔊 เปิดเสียง" : "🔇 ปิดเสียง"}</button>
                  <button id="reviewBtn" class="btn btn-gold">📘 REVIEW</button>
                  <button id="startBtn" class="btn btn-primary" style="flex:1">START MISSION</button>
                </div>
                <div class="ring"><div class="core">PINK</div></div>
                <div class="promo">
                  Premium Pink No Timer Mode • ทบทวนก่อนเล่น • ฟังเสียงได้ • พร้อมโหลดใช้สอนทันที
                </div>
              </div>
            </div>
          </div>
        </div>`;
    }

    function renderReview(){
      return `
        <div class="review-screen">
          <div class="wrap">
            <div class="glass neon review-shell">
              <div class="review-head">
                <div class="badge">📘 PREMIUM REVIEW MODE</div>
                <h1>ทบทวนคำศัพท์ก่อนประลอง 💖</h1>
                <div class="review-sub">กดฟังเสียงทีละคำได้เลย แล้วค่อยกดเริ่มเกม เด็ก ๆ จะมั่นใจขึ้นมาก ✨</div>
              </div>

              <div class="review-grid">
                ${WORDS.map(w=>`
                  <div class="review-card">
                    <div class="review-word">${w.word}</div>
                    <div class="review-hint">${w.hint}</div>
                    <button class="speak-btn" onclick="speakWord('${w.word}')">🔊 ฟังคำนี้</button>
                  </div>
                `).join("")}
              </div>

              <div class="review-actions">
                <button id="reviewHomeBtn" class="btn btn-secondary">🏠 หน้าแรก</button>
                <button id="startFromReviewBtn" class="btn btn-primary">🎮 เริ่มประลอง</button>
              </div>
            </div>
          </div>
        </div>`;
    }

    function renderGame(){
      const progress=state.wordIndex+1, total=WORDS.length;
      const flashClass=state.flash==="correct" ? "flash-correct" : state.flash==="wrong" ? "flash-wrong" : "";
      return `
        <div class="game">
          <div class="wrap">
            <div class="hud">
              <div class="glass neon hud-card">
                <div class="stats">
                  <div class="stat"><div class="k">ผู้เล่น</div><div class="v">${state.playerName || "Guest"}</div></div>
                  <div class="stat"><div class="k">คำที่</div><div class="v">${progress} / ${total}</div></div>
                  <div class="stat"><div class="k">ครั้งที่ลอง</div><div class="v v-blue">${state.attempts}</div></div>
                  <div class="stat"><div class="k">คะแนน</div><div class="v v-yellow">${state.score}</div></div>
                </div>
              </div>

              <div class="glass neon hud-card mission">
                <h3>MISSION</h3>
                <div class="big">${state.usedMeaning ? `คำแปล: ${state.round.hint}` : "เรียงคำจากตัวอักษรที่กระจัดกระจาย"}</div>
                <div class="point">${currentScoreGuide()}</div>
              </div>
            </div>

            <div class="glass neon arena ${flashClass}">
              <div class="step-banner">WORD COMBINATION ZONE</div>

              <div class="help-row">
                <button class="btn btn-help ${state.usedMeaning?'used':''}" onclick="useMeaningHint()" ${state.usedMeaning?'disabled':''}>💡 ต้องการคำแปล</button>
                <button class="btn btn-help ${state.usedReveal?'used':''}" onclick="useRevealHint()" ${state.usedReveal?'disabled':''}>🧩 เติมให้ 2 ช่อง</button>
                <button class="btn btn-danger" onclick="clearSlots()">🗑️ Clear</button>
              </div>

              <div class="hint-status">
                ${state.usedMeaning ? `คำแปล: <span style="color:#fff2a8">${state.round.hint}</span>` : `ยังไม่เปิดคำแปล`}
                &nbsp; • &nbsp;
                ${state.usedReveal ? `เปิดตัวช่วย 2 ช่องแล้ว` : `ยังไม่เปิดตัวช่วย 2 ช่อง`}
              </div>

              <div class="slots">
                ${state.slots.map((slot,i)=>`
                  <button class="slot ${slot?'filled':''} ${slot&&slot.fixed?'fixed':''}" onclick="removeLetter(${i})">${slot?slot.ch:""}</button>
                `).join("")}
              </div>

              <div class="letters">
                ${state.pool.map(item=>`
                  <button class="letter" onclick="placeLetter('${item.id}')">${item.ch}</button>
                `).join("")}
              </div>

              <div class="controls">
                <button class="btn btn-gold" onclick="checkAnswer()" ${state.slots.some(s=>!s) ? 'disabled' : ''}>ตรวจคำตอบ</button>
              </div>

              <div class="bottom-note">โหมดไม่จับเวลา เด็ก ๆ ค่อย ๆ เรียงคำให้ถูกต้องได้เลย ✨</div>
            </div>
          </div>
        </div>`;
    }

    function renderSummary(){
      return `
        <div class="summary-screen">
          <div class="summary-box glass neon">
            <div class="summary-head">
              <div class="badge">🏆 MISSION COMPLETE</div>
              <h1>${state.playerName || "Guest"} 🎉</h1>
              <div class="score-line">คะแนนรวม ${state.score} / 60</div>
              <div class="muted" style="margin-top:10px;font-weight:700">
                สรุปผลการเล่นของ Word Shuffle Storm Set C
              </div>
            </div>

            <div class="summary-grid">
              ${state.history.map(h=>`
                <div class="mini">
                  <div class="top">
                    <div class="word">${h.word}</div>
                    <span class="tag ${h.result==='correct'?'ok':h.result==='timeout'?'timeout':'bad'}">${h.result}</span>
                  </div>
                  <div class="muted" style="margin-top:8px">คำแปล: ${h.hint}</div>
                  <div class="muted" style="margin-top:4px">คำตอบ: <b style="color:white">${h.answer}</b></div>
                  ${h.attempt ? `<div class="muted" style="margin-top:4px">ที่ตอบ: ${h.attempt}</div>` : ``}
                  <div class="muted" style="margin-top:4px">ตัวช่วย: ${h.usedMeaning ? 'แปล ' : ''}${h.usedReveal ? 'เปิด 2 ช่อง' : (!h.usedMeaning ? 'ไม่ใช้' : '')}</div>
                  <div class="muted" style="margin-top:4px">จำนวนครั้งที่ลอง: ${h.attempts || 1}</div>
                  <div style="margin-top:10px;color:var(--yellow);font-weight:900">+${h.gained} คะแนน</div>
                </div>
              `).join("")}
            </div>

            <div style="text-align:center;margin-top:24px">
              <button class="btn btn-primary" onclick="goHome()">กลับหน้าเริ่มต้น</button>
            </div>
          </div>
        </div>`;
    }

    function render(){
      const app=document.getElementById("app");
      if(state.screen==="start"){
        app.innerHTML=renderStart();
        document.getElementById("playerName").addEventListener("input", e=>state.playerName=e.target.value);
        document.getElementById("toggleSfx").addEventListener("click", ()=>{
          state.sfxOn=!state.sfxOn;
          render();
        });
        document.getElementById("reviewBtn").addEventListener("click", showReview);
        document.getElementById("startBtn").addEventListener("click", startCountdownThenPlay);
      } else if(state.screen==="review"){
        app.innerHTML=renderReview();
        document.getElementById("reviewHomeBtn").addEventListener("click", goHome);
        document.getElementById("startFromReviewBtn").addEventListener("click", startCountdownThenPlay);
      } else if(state.screen==="game"){
        app.innerHTML=renderGame();
      } else {
        app.innerHTML=renderSummary();
      }
    }

    window.placeLetter=placeLetter;
    window.removeLetter=removeLetter;
    window.clearSlots=clearSlots;
    window.useMeaningHint=useMeaningHint;
    window.useRevealHint=useRevealHint;
    window.checkAnswer=checkAnswer;
    window.speakWord=speakWord;
    window.showReview=showReview;
    window.goHome=goHome;

    render();
  </script>
</body>
</html>
